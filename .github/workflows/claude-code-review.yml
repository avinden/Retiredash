name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          include_fix_links: true
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            ## RetireView Project Rules

            ### REQUEST_CHANGES (blocking):
            1. `any` type used — must use `unknown` + type guards
            2. Files in `src/lib/calculations/` or `src/lib/parsers/` missing a co-located `.test.ts` file
            3. Hardcoded secrets, API keys, or passwords in source code
            4. `console.log` of financial data (balances, account numbers, amounts)
            5. Money stored as floats instead of integer cents
            6. Direct Supabase import outside `src/lib/db/queries/`

            ### COMMENT (non-blocking):
            - File exceeds 200 lines
            - Function exceeds 30 lines
            - Component has more than 5 props
            - Missing explicit return types on exported functions
            - Unnecessary `"use client"` directive
            - Modifications to `src/components/ui/` (shadcn — should not be edited)

            ### Financial correctness checks:
            - Gains must be calculated as: ending_balance - beginning_balance - contributions
            - Retirement target must be: annual_spend / withdrawal_rate (default 0.04)
            - Money display must use `formatCurrency(cents)` only at the display layer, never store formatted strings
